---
- name: Update OS package caches for Debian
  apt:
    update_cache: yes
  when: ansible_facts['os_family'] == 'Debian'
  tags:
    - dir-backup
    - dir-backup-update-packages
    - webserver
    - appserver
    - dbserver

- name: Update OS package caches for CentOS
  dnf:
    update_cache: yes
  when: ansible_facts['os_family'] == 'RedHat'
  tags:
    - dir-backup
    - dir-backup-update-packages
    - webserver
    - appserver
    - dbserver

- name: Update OS packages
  package:
    name: '*'
    state: latest
  tags:
    - dir-backup
    - dir-backup-update-packages
    - webserver
    - appserver
    - dbserver

# For Ubuntu
- name: Install OS packages for Debian
  package:
    name: "{{ dir_backup_debian_install }}"
    state: latest
  when: ansible_facts['os_family'] == 'Debian'
  tags:
    - dir-backup
    - dir-backup-install-packages
    - webserver
    - appserver
    - dbserver

# For CentOS
- name: Install OS packages for CentOS
  package:
    name: "{{ dir_backup_redhat_install }}"
    state: latest
  when: ansible_facts['os_family'] == 'RedHat'
  tags:
    - dir-backup
    - dir-backup-install-packages
    - webserver
    - appserver
    - dbserver

- name: Create target directories backup script directory
  file:
    path: "{{ dir_backup_bin_dir }}"
    state: directory
    owner: root
    group: root
    mode: 0755
  tags:
    - dir-backup
    - dir-backup-create-backup-script-directory
    - webserver
    - appserver
    - dbserver

- name: Configure a target directories backup script
  template:
    src: "{{ dir_backup_script_path.lstrip('/') }}.j2"
    dest: "{{ dir_backup_script_path }}"
    owner: root
    group: root
    mode: 0755
  tags:
    - dir-backup
    - dir-backup-configure-script
    - webserver
    - appserver
    - dbserver

- name: Download a core dir backup script from github
  git:
    repo: "{{ dir_backup_core_script_repo }}"
    dest: "{{ dir_backup_core_script_download_dir }}"
    version: "{{ dir_backup_core_script_version }}"
  tags:
    - dir-backup
    - dir-backup-download-core-dir-backup-script
    - webserver
    - appserver
    - dbserver

- name: Check the core dir backup script exists
  stat:
    path: "{{ dir_backup_core_script_download_dir.rstrip('/') }}/{{ dir_backup_core_script_name }}"
  register: dir_backup
  tags:
    - dir-backup
    - dir-backup-check-core-dir-backup-script-exists
    - webserver
    - appserver
    - dbserver

- name: Copy a core dir backup script
  copy:
    remote_src: yes
    src: "{{ dir_backup_core_script_download_dir.rstrip('/') }}/{{ dir_backup_core_script_name }}"
    dest: "{{ dir_backup_core_script_install_dir.rstrip('/') }}/{{ dir_backup_core_script_name }}"
    owner: root
    group: root
    mode: 0755
  when: dir_backup.stat.exists
  tags:
    - dir-backup
    - dir-backup-copy-core-dir-backup-script
    - webserver
    - appserver
    - dbserver

# Reference: https://opensource.com/article/20/7/systemd-timers
- name: Create backup services
  template:
    src: "{{ item.lstrip('/') }}.j2"
    dest: "{{ item }}"
    owner: root
    group: root
    mode: 0644
  with_items:
    - "{{ dir_backup_service_path }}"
    - "{{ dir_backup_timer_path }}"
  tags:
    - dir-backup
    - dir-backup-create-backup-services
    - webserver
    - appserver
    - dbserver

- name: Check backup timer exists
  stat:
    path: "{{ dir_backup_timer_path }}"
  register: dir_backup_timer_path_result
  tags:
    - dir-backup
    - dir-backup-check-backup-timer
    - webserver
    - appserver
    - dbserver

- name: Enable backup timer
  systemd:
    name: "{{ dir_backup_timer_name }}"
    state: started
    enabled: true
    daemon-reload: true
  when: dir_backup_timer_path_result.stat.exists
  tags:
    - dir-backup
    - dir-backup-enable-backup-timer
    - webserver
    - appserver
    - dbserver
